<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Ваша корзина</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-8 bg-white p-4 shadow-sm rounded">
                <h2>🛒 Ваша корзина</h2>
                <hr>
                {% if items %}
                <table class="table align-middle">
                    <thead>
                        <tr>
                            <th>Товар</th>
                            <th>Кол-во</th>
                            <th>Цена</th>
                            <th>Итого</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for item in items %}
                        <tr>
                            <td>{{ item.product.name }}</td>
                            <td>{{ item.quantity }} шт.</td>
                            <td>{{ item.product.price }} ₽</td>
                            <td><strong>{{ item.subtotal }} ₽</strong></td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
                <div class="text-end mt-4">
                    <h4>Всего: <span class="text-success">{{ total_price }} ₽</span></h4>
                    <a href="/clear_cart" class="btn btn-outline-danger btn-sm">Очистить</a>
                    <button class="btn btn-primary btn-lg ms-3">Оформить заказ</button>
                </div>
                {% else %}
                <div class="text-center py-5">
                    <p class="text-muted">Корзина пока пуста</p>
                    <a href="/" class="btn btn-primary">Вернуться к покупкам</a>
                </div>
                {% endif %}
            </div>
        </div>
    </div>
</body>
</html>
